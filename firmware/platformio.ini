; PlatformIO project for the ESP32 air-quality monitoring/control system.
; See ../docs/thesis.md sections 2.3-2.4 for the hardware and firmware design this implements.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; WiFi + Bluetooth + MQTT + LittleFS together exceed the default ~1.3 MB
; OTA-dual-partition app size; min_spiffs.csv keeps two ~1.9 MB OTA slots
; (the thesis calls for OTA updates, section 3.3) at the cost of a smaller
; SPIFFS/LittleFS data partition, which this project's small event log fits
; comfortably within.
board_build.partitions = min_spiffs.csv
lib_deps =
    adafruit/Adafruit BME280 Library@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.14
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    knolleary/PubSubClient@^2.8
build_flags =
    -DCORE_DEBUG_LEVEL=3

; Host-native environment: compiles and runs the hardware-independent unit
; tests in test/ against the lib/control_logic sources only (no Arduino/ESP32
; toolchain involved). This is the offline verification path described in
; PROCESS_LOG.md — there is no physical board available for this project.
[env:native]
platform = native
test_framework = unity
build_src_filter = -<*>
